# MPAS NUOPC Atmosphere Test Configuration
# Each [section] defines one test case
#
# Available options per test:
#   name      - Test name (defaults to section name)
#   rundir    - Run directory name relative to base rundir (defaults to section name)
#   esmxcfg   - ESMX runtime configuration file (required)
#   mpitsks   - Number of MPI tasks (defaults to 4)
#   runinputs - List of input, defined using dictionary syntax
#
# Format for runinputs (one line per input):
# runinputs =
#   {"type": "copy",     "src": "path"}              - Copy file or directory
#   {"type": "symlink",  "src": "path"}              - Create symbolic link
#   {"type": "extract",  "src": "url"}               - Download and extract archive
#   {"type": "extract",  "src": "url", "strip": N}   - Download, extract, strip N levels
#   {"type": "download", "src": "url"}               - Download file without extraction


[DEFAULT]
# Default values for all tests
mpitsks = 4

[atm_mountain_wave]
esmxcfg = run_atm.yml
mpitsks = 2
runinputs =
  {"type": "copy", "src": "input/run_atm.yml"}
  {"type": "symlink", "src": "input/fd_mpas.yml"}
  {"type": "extract", "src": "https://www2.mmm.ucar.edu/projects/mpas/test_cases/v7.0/mountain_wave.tar.gz", "strip": 1}

[atmocn]
esmxcfg = run_atmocn.yml
runinputs =
  {"type": "copy", "src": "input/run_atmocn.yml"}
  {"type": "symlink", "src": "input/fd_mpas.yml"}
